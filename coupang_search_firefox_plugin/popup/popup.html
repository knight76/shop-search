<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가격비교</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 650px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .search-box {
      position: relative;
      display: flex;
      gap: 8px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    #keyword {
      width: 100%;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }


    #searchBtn {
      padding: 10px 20px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #searchBtn:hover {
      transform: scale(1.05);
    }

    #searchBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #ddd;
      font-weight: 600;
      font-size: 13px;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-history {
      color: #999;
      cursor: pointer;
      font-size: 11px;
    }

    .clear-history:hover {
      color: #f44336;
    }

    .history-list {
      list-style: none;
    }

    .history-list-item {
      padding: 12px 15px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .history-list-item:hover {
      background: #f8f9fa;
    }

    .history-list-item.active {
      background: #e3f2fd;
      color: #1976d2;
    }

    .history-item-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item-delete {
      color: #999;
      font-size: 16px;
      padding: 0 5px;
      margin-left: 8px;
    }

    .history-item-delete:hover {
      color: #f44336;
    }

    .history-empty {
      padding: 30px 15px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }

    .content {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f5f5f5;
    }

    .section {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-coupang {
      background: #fa622f;
      color: white;
    }

    .badge-naver {
      background: #03c75a;
      color: white;
    }

    .item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-size: 13px;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .item-price {
      font-size: 16px;
      font-weight: 700;
      color: #fa622f;
    }

    .item-mall {
      color: #999;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .info {
      background: #e3f2fd;
      color: #1976d2;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h1 style="margin: 0;">🛒 쿠팡 vs 네이버 가격비교</h1>
      <span id="currentTime" style="font-size: 11px; color: rgba(255,255,255,0.8);"></span>
    </div>
    <div class="search-box">
      <div class="input-wrapper">
        <input type="text" id="keyword" placeholder="검색어를 입력하세요 (예: 삼다수 2L)" autocomplete="off" />
      </div>
      <button id="searchBtn">검색</button>
    </div>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>검색 기록</span>
        <span class="clear-history" id="clearHistory">전체삭제</span>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">검색 기록이 없습니다</li>
      </ul>
    </div>

    <div class="content" id="results">
      <div class="empty">
        👆 검색어를 입력하고 검색 버튼을 눌러주세요
      </div>
    </div>
  </div>

  <script>
    // 캐시 방지를 위한 타임스탬프
    const timestamp = new Date().getTime();
    const script = document.createElement('script');
    script.src = `popup.js?v=${timestamp}`;
    document.body.appendChild(script);
  </script>
</body>
</html>
